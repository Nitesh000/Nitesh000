name: Update README with Hashnode Posts

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch and update posts
        run: |
          python << 'EOF'
          import requests
          import re

          # Fetch posts from Hashnode
          query = """
          {
            publication(host: "blog.thecodingant.in") {
              posts(first: 7) {
                edges {
                  node {
                    title
                    url
                    publishedAt
                  }
                }
              }
            }
          }
          """

          response = requests.post('https://gql.hashnode.com', json={'query': query})
          data = response.json()

          posts = data['data']['publication']['posts']['edges']

          # Format posts
          post_list = []
          for post in posts:
              node = post['node']
              title = node['title']
              url = node['url']
              date = node['publishedAt'][:10]
              post_list.append(f"- [{title}]({url}) - {date}")

          posts_markdown = '\n'.join(post_list)

          # Read README
          with open('README.md', 'r') as f:
              content = f.read()

          # Update content between markers
          pattern = r'<!-- BLOG-POST-LIST:START -->.*?<!-- BLOG-POST-LIST:END -->'
          replacement = f'<!-- BLOG-POST-LIST:START -->\n{posts_markdown}\n<!-- BLOG-POST-LIST:END -->'
          new_content = re.sub(pattern, replacement, content, flags=re.DOTALL)

          # Write back
          with open('README.md', 'w') as f:
              f.write(new_content)

          print("✅ README updated successfully!")
          EOF

      - name: Commit changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md
          git diff --quiet && git diff --staged --quiet || git commit -m "Updated with latest blog posts"
          git push
